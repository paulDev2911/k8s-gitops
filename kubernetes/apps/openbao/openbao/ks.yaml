---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openbao
spec:
  interval: 1h
  path: ./kubernetes/apps/openbao/openbao/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: openbao
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: openbao
      namespace: openbao
